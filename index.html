<!-- ===== МОДАЛКА ДЛЯ СТАТИСТИКИ ===== -->
<div class="modal-overlay" id="statsModal">
    <div class="modal">
        <h3><i class="fas fa-chart-bar"></i> Ввести статистику</h3>
        <p style="color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem; font-weight: 500;">Игрок: <strong id="modalPlayerName"></strong></p>
        <div class="form-group">
            <label>Количество убийств</label>
            <input type="number" id="modalKills" value="0" min="0" />
        </div>
        <div class="form-group">
            <label>Количество смертей</label>
            <input type="number" id="modalDeaths" value="0" min="0" />
        </div>
        <button class="btn-submit-modal" id="modalSubmitBtn"><i class="fas fa-check"></i> Зачислить</button>
        <button class="btn-cancel-modal" onclick="closeStatsModal()"><i class="fas fa-times"></i> Отмена</button>
    </div>
</div>

<!-- ===== МОДАЛКА ДЛЯ ОБЪЯВЛЕНИЯ ===== -->
<div class="modal-overlay" id="announceModal">
    <div class="modal">
        <h3><i class="fas fa-bullhorn"></i> Объявление</h3>
        <p style="color: var(--text-secondary); text-align: center; margin-bottom: 0.5rem; font-weight: 500;">Выберите время до создания DM сервера</p>
        <div class="time-options" id="timeOptions">
            <button onclick="selectTime(5)" data-time="5">5 минут</button>
            <button onclick="selectTime(10)" data-time="10">10 минут</button>
            <button onclick="selectTime(15)" data-time="15">15 минут</button>
        </div>
        <div class="form-group">
            <label>Текст объявления (необязательно)</label>
            <textarea id="announceText" placeholder="Введите дополнительный текст..." rows="3"></textarea>
        </div>
        <button class="btn-submit-modal" id="announceSubmitBtn"><i class="fas fa-bullhorn"></i> Отправить объявление</button>
        <button class="btn-cancel-modal" onclick="closeAnnounceModal()"><i class="fas fa-times"></i> Отмена</button>
    </div>
</div>
