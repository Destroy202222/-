        :root {
            --primary: #ff7b00;

            --text-primary: #e0dcd0;

            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;

        body[data-theme="red"] {
            --primary: #e03131;

            --primary-glow: rgba(224, 49, 49, 0.25);
            --gradient-start: #e03131;
            --gradient-end: #fa5252;

        body[data-theme="green"] {
            --primary: #2b8a3e;

            --shadow-color: rgba(43, 138, 62, 0.15);
        }
        body[data-theme="black"] {

            --bg-main: #000000;
            --bg-card: #0a0a0a;
            --border-color: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #666666;
            --bg-input: #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-main); color: var(--text-primary); min-height: 100vh; transition: background 0.3s, color 0.3s; }

        .header {

            box-shadow: 0 0 60px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .header.visible { display: block; }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo-center { flex: 1; text-align: center; cursor: pointer; transition: 0.3s; }
        .logo-center:hover { transform: scale(1.02); }
        .logo-center h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end), var(--gradient-start));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            display: inline-block;
            transition: background 0.3s;
        }
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .logo-center .badge {
            background: var(--primary);
            color: var(--bg-main);
            padding: 0.1rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            -webkit-text-fill-color: var(--bg-main);
            display: inline-block;
            margin-left: 0.5rem;
            transition: background 0.3s;
        }
        .logo-center .sub {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 3px;
            -webkit-text-fill-color: var(--text-secondary);
            margin-top: 0.2rem;
        }
        .right-buttons { display: flex; align-items: center; gap: 1rem; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-btn {
            background: transparent;
            color: var(--text-primary);
            padding: 0.7rem 1.8rem;
            border: 2px solid var(--primary);
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .dropdown-btn:hover { background: var(--primary-glow); box-shadow: 0 0 30px var(--primary-glow); }
        .dropdown-btn i { color: var(--primary); transition: 0.3s; }
        .dropdown.active .dropdown-btn i.fa-chevron-down { transform: rotate(180deg); }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 110%;
            background: var(--bg-card);
            min-width: 220px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            animation: slideDown 0.3s ease;
        }
