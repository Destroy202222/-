        // ====================================================
        // ===== API ЗАПРОСЫ =====
        // ====================================================
        
        async function apiRequest(endpoint, options = {}) {
            const url = `${SUPABASE_URL}${endpoint}`;
            
            const headers = {
                'apikey': SUPABASE_KEY,
                'Content-Type': 'application/json',
            };
            
            if (options.method === 'POST' || options.method === 'PATCH') {
                headers['Prefer'] = 'return=representation';
            }
            
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: headers
                });
                
                if (!response.ok) {
                    let errorMessage = `HTTP ${response.status}`;
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.message || errorData.error || errorMessage;
                    } catch (e) {
                        try {
                            const text = await response.text();
                            if (text) errorMessage = text;
                        } catch (e2) {}
                    }
                    throw new Error(errorMessage);
                }
                
                const contentLength = response.headers.get('content-length');
                if (contentLength === '0' || response.status === 204) {
                    return [];
                }
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }
        
        // ====================================================
        // ===== ОСТАЛЬНЫЕ ФУНКЦИИ (ТЕ ЖЕ, ЧТО БЫЛИ) =====

        async function getNextDMNumber() {
            try {
                // Пробуем получить данные
                let data = await apiRequest('/dm_counter?id=eq.1');
                
                if (data && data.length > 0) {
                    const current = data[0].count || 0;
                    const next = current + 1;
                    
                    // Обновляем счётчик
                    await apiRequest('/dm_counter?id=eq.1', {
                        method: 'PATCH',
                        body: JSON.stringify({ count: next })
                    });
                    return next;
                } else {
                    // Если записи нет — создаём
                    await apiRequest('/dm_counter', {
                        method: 'POST',
                        body: JSON.stringify([{ id: 1, count: 1 }])
                    });
                    return 1;
                }
            } catch (error) {
                console.error('❌ Ошибка:', error);
                showToast('error', 'Ошибка', 'Не удалось получить номер DM сервера. Проверьте таблицу dm_counter в Supabase.');
                return 0;
            }
        }
        
        async function createServer() {
            if (!await isAdmin()) {
                showToast('error', 'Доступ запрещен', 'Только администраторы могут создавать DM сервера');
                return;
            }
            
            const name = document.getElementById('serverNameInput').value.trim();
            const lobby = document.getElementById('serverLobbyInput').value.trim();
            const playerId = document.getElementById('serverPlayerIdInput').value.trim();
            const map = document.getElementById('serverMapInput').value.trim();
            
            if (!name || !lobby || !playerId || !map) {
                showToast('error', 'Ошибка', 'Заполните все поля');
                return;
            }
        
            try {
                const user = getCurrentUser();
                const dmNumber = await getNextDMNumber();
                
                if (dmNumber === 0) {
                    return;
                }
                
                const serverName = `DM #${dmNumber} | ${name}`;
                
                const newServer = {
                    id: Date.now(),
                    name: serverName,
                    lobby: lobby,
                    playerId: playerId,
                    map: map,
                    status: 'online',
                    pending: [],
                    createdAt: new Date().toISOString(),
                    createdBy: user?.username || 'admin',
                    dmNumber: dmNumber
                };
        
                await apiRequest('/servers', {
                    method: 'POST',
                    body: JSON.stringify([newServer])
                });
        
                document.getElementById('serverNameInput').value = '';
                document.getElementById('serverLobbyInput').value = '';
                document.getElementById('serverPlayerIdInput').value = '';
                document.getElementById('serverMapInput').value = '';
                
                const message = `DM #${dmNumber}
        Хост: ${user?.username || 'Unknown'}
        Режим: ${name}
        Время: 10 минут
        Карта: ${map}`;
                
                await sendTelegramNotification(message);
                
                showToast('success', 'Сервер создан', `Сервер "${serverName}" успешно добавлен`);
                fetchServers();
                fetchSiteStats();
            } catch (error) {
                console.error('❌ Ошибка создания сервера:', error);
                showToast('error', 'Ошибка', error.message);
            }
        }
